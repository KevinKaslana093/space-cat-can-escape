<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#07051d" />
  <title>太空猫小鱼干大逃亡</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game" aria-label="太空猫小鱼干大逃亡游戏画面"></canvas>
  <div id="hud" class="hidden">
    <div class="stat"><span>距离</span><b id="distance">0m</b></div>
    <div class="stat cans"><span>小鱼干</span><b id="cans">0</b></div>
    <div class="stat life"><span>生命</span><b id="lives">♥♥♥</b></div>
    <div class="stat"><span>纪录</span><b id="best">0</b></div>
    <button id="musicBtn" class="icon-btn" aria-label="音乐开关">♫</button><button id="pauseBtn" class="icon-btn" aria-label="暂停">Ⅱ</button>
  </div>
  <section id="titleScreen" class="screen">
    <div class="panel hero-panel">
      <div class="pixel-kicker">✦ NEON CAT FLIGHT ✦</div>
      <h1>太空猫<br><em>小鱼干大逃亡</em></h1>
      <p>穿越霓虹星轨，撞碎陨石，收集里面藏着的小鱼干！</p>
      <img class="pixel-cat-art" src="pixel-cat.png" alt="灰色像素太空猫拖着彩虹飞行" />
      <button id="startBtn" class="primary">开始逃亡</button>
      <button id="howBtn" class="secondary">怎么玩</button>
      <div class="tiny">电脑 · 手机 · 平板均可游玩</div>
    </div>
  </section>
  <section id="howScreen" class="screen hidden">
    <div class="panel">
      <div class="pixel-kicker">飞行手册</div>
      <h2>活下去，猫猫！</h2>
      <div class="instructions">
        <div><b>电脑</b><span>WASD / 方向键移动</span></div>
        <div><b>手机</b><span>按住屏幕拖动猫猫</span></div>
        <div><b>目标</b><span>躲陨石 · 吃小鱼干 · 闯弹幕</span></div>
        <div><b>技能</b><span>每 5 条鱼获得冲刺 · E 键吞噬 · 每 2 分钟 Boss</span></div>
      </div>
      <button id="playBtn" class="primary">我准备好了</button>
    </div>
  </section>
  <section id="pauseScreen" class="screen hidden">
    <div class="panel small"><h2>暂停啦</h2><p>猫猫正在宇宙里打盹。</p><button id="resumeBtn" class="primary">继续飞</button><button id="quitBtn" class="secondary">返回标题</button></div>
  </section>
  <section id="resultScreen" class="screen hidden">
    <div class="panel"><div class="pixel-kicker">本次航行报告</div><h2 id="resultTitle">猫猫撞晕啦！</h2><div class="score-card"><span>总分</span><strong id="finalScore">0</strong><small id="newBest"></small></div><div class="result-row"><span>飞行距离 <b id="finalDistance">0m</b></span><span>小鱼干 <b id="finalCans">0</b></span></div><button id="restartBtn" class="primary">再飞一次</button><button id="homeBtn" class="secondary">返回标题</button></div>
  </section>
  <button id="devourBtn" class="ultimate hidden" aria-label="宇宙吞噬"><span>😺</span><small>吞噬</small></button>
  <button id="dashBtn" class="dash hidden" aria-label="冲击护盾"><span>◉</span><small>护盾冲刺</small></button>
  <div id="toast" class="toast hidden"></div>
  <section id="rotateScreen" aria-label="请横屏游玩"><div><span>↻</span><h2>请旋转手机</h2><p>本游戏需要横屏游玩</p></div></section>
  <audio id="bgm" src="space-cat-bgm.mp3" preload="auto" loop></audio>
  <script src="game.js"></script>
</body>
</html>
